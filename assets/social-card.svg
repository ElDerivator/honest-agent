<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="'JetBrains Mono','SFMono-Regular',Menlo,Consolas,monospace">
  <rect width="1280" height="640" fill="#0d1117"/>
  <rect x="20" y="20" width="1240" height="600" rx="16" fill="none" stroke="#21262d" stroke-width="2"/>

  <text x="80" y="170" fill="#e6edf3" font-size="76" font-weight="700">honest-agent</text>
  <text x="82" y="232" fill="#8b949e" font-size="30">Evidence-gated task completion for autonomous agents</text>

  <rect x="80" y="290" width="1120" height="210" rx="12" fill="#010409" stroke="#21262d" stroke-width="1.5"/>
  <circle cx="112" cy="320" r="7" fill="#ff5f56"/>
  <circle cx="136" cy="320" r="7" fill="#ffbd2e"/>
  <circle cx="160" cy="320" r="7" fill="#27c93f"/>

  <text x="112" y="375" font-size="27" fill="#8b949e">close_episode(<tspan fill="#a5d6ff">"COMPLETED"</tspan>)                  → <tspan fill="#e3b341" font-weight="700">UNVERIFIED</tspan></text>
  <text x="112" y="420" font-size="27" fill="#8b949e">close_episode(<tspan fill="#a5d6ff">"COMPLETED"</tspan>, proof)    → <tspan fill="#3fb950" font-weight="700">COMPLETED</tspan></text>
  <text x="112" y="465" font-size="27" fill="#8b949e">raise RuntimeError                       → <tspan fill="#f85149" font-weight="700">FAILED</tspan></text>

  <text x="80" y="560" fill="#6e7681" font-size="26">The oracle of truth is the environment, not the model.</text>
  <text x="1200" y="560" fill="#6e7681" font-size="24" text-anchor="end">Apache-2.0</text>
</svg>
